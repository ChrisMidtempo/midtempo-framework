name: Bug Report
description: Report a bug to help improve the project
title: "[BUG] "
labels: [bug]
assignees: [ChrisMidtempo]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the bug
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What should have happened instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the framework is affected?
      options:
        - Templates
        - Schema / Configuration
        - CLI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and how you installed the framework
      placeholder: "e.g. macOS 14, Python 3.12, installed via pip"
    validations:
      required: false

  - type: textarea
    id: traceback
    attributes:
      label: Error Output
      description: Paste any tracebacks or log output here
      render: shell
    validations:
      required: false
